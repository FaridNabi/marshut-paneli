<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xüsusi Marşrut Optimizasiyası Paneli</title>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=SƏNİN_API_AÇARIN&libraries=places"></script>
    
    <style>
        /* Orijinal Vizual Struktur */
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; background-color: #f4f5f7; }
        #sidebar { width: 360px; background: #ffffff; padding: 25px; box-shadow: 3px 0 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; z-index: 10; }
        #map { flex: 1; height: 100%; }
        
        h2 { color: #0d3b66; font-size: 22px; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .desc { font-size: 13px; color: #666; margin-bottom: 15px; line-height: 1.4; }
        
        textarea { width: 100%; height: 180px; margin-bottom: 15px; padding: 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; resize: none; box-sizing: border-box; font-family: inherit; }
        textarea:focus { border-color: #0d3b66; outline: none; }
        
        button { width: 100%; padding: 14px; background: #0d3b66; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #05203c; }
        
        #output { margin-top: 20px; font-size: 14px; color: #333; overflow-y: auto; flex: 1; border-top: 1px solid #eee; padding-top: 15px; }
        ol { padding-left: 20px; margin-top: 10px; }
        li { margin-bottom: 8px; line-height: 1.4; }

        /* Müəllif İmza Bölməsi (Footer) */
        .author-box { margin-top: auto; padding-top: 20px; border-top: 1px solid #eee; text-align: center; }
        .author-text { font-size: 12px; color: #555; margin-bottom: 10px; }
        .author-name { font-weight: bold; color: #0d3b66; }
        
        .contact-links { display: flex; justify-content: center; gap: 12px; }
        .contact-btn { display: flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; text-decoration: none; color: white; transition: opacity 0.2s; }
        .contact-btn:hover { opacity: 0.9; }
        
        .whatsapp { background-color: #25D366; }
        .mail { background-color: #ea4335; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>NAVİQASİYA PANELİ</h2>
        <p class="desc">Ünvanları, Plus Kodları və ya Koordinatları hər sətirdə biri olmaqla daxil edin. İlk sətir başlanğıc, son sətir isə son nöqtə sayılacaq.</p>
        
        <textarea id="address-input" placeholder="Nümunə:&#10;40.570409, 49.690194&#10;Bakı, 28 May metrosu&#10;FX7W+MX Bakı"></textarea>
        
        <button onclick="calculateOptimalRoute()">Optimal Marşrutu Qur</button>
        
        <div id="output"></div>

        <div class="author-box">
            <p class="author-text">Proqram təminatı müəllifi: <span class="author-name">Farid Nabizada</span></p>
            <div class="contact-links">
                <a href="https://wa.me/994508215545" target="_blank" class="contact-btn whatsapp">
                    💬 WhatsApp
                </a>
                <a href="mailto:farid.nabizada.95@gmail.com" class="contact-btn mail">
                    ✉️ E-Mail
                </a>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        let map, directionsService, directionsRenderer;

        function initMap() {
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer();
            
            // Bakı mərkəzli baza xəritəsi
            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 12,
                center: { lat: 40.409264, lng: 49.867092 }
            });
            directionsRenderer.setMap(map);
        }

        function calculateOptimalRoute() {
            const textInput = document.getElementById('address-input').value.trim();
            if (!textInput) {
                alert("Zəhmət olmasa məkanları daxil edin!");
                return;
            }

            let points = textInput.split('\n').map(p => p.trim()).filter(p => p.length > 0);
            if (points.length < 2) {
                alert("Minimum 2 nöqtə daxil edilməlidir.");
                return;
            }

            let originPoint = points[0];
            let destinationPoint = points[points.length - 1];
            let waypoints = [];

            for (let i = 1; i < points.length - 1; i++) {
                waypoints.push({
                    location: points[i],
                    stopover: true
                });
            }

            let request = {
                origin: originPoint,
                destination: destinationPoint,
                waypoints: waypoints,
                optimizeWaypoints: true,
                travelMode: google.maps.TravelMode.DRIVING,
                drivingOptions: {
                    departureTime: new Date(Date.now()),
                    trafficModel: google.maps.TrafficModel.BEST_GUESS
                }
            };

            // Heç bir əlavə süzgəc olmadan birbaşa Google Maps mexanizminə ötürülür
            directionsService.route(request, function(response, status) {
                if (status === google.maps.DirectionsStatus.OK) {
                    directionsRenderer.setDirections(response);
                    displayOptimizedOrder(response, points);
                } else {
                    alert("Marşrut hesablana bilmədi: " + status);
                }
            });
        }

        function displayOptimizedOrder(response, originalPoints) {
            let route = response.routes[0];
            let order = route.waypoint_order;
            let outputDiv = document.getElementById('output');
            
            let html = "<strong>Sıralanmış Yol Trayektoriyası:</strong><ol>";
            html += `<li>${originalPoints[0]} (Başlanğıc)</li>`;
            
            for (let i = 0; i < order.length; i++) {
                let originalIndex = order[i] + 1;
                html += `<li>${originalPoints[originalIndex]}</li>`;
            }
            
            html += `<li>${originalPoints[originalPoints.length - 1]} (Son Nöqtə)</li>`;
            html += "</ol>";
            
            outputDiv.innerHTML = html;
        }

        window.onload = initMap;
    </script>
</body>
</html>
